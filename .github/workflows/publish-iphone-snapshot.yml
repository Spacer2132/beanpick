name: Publish iPhone Snapshot

on:
  workflow_dispatch:
  schedule:
    # GitHub cron은 UTC 기준이다. 한국시간 07:30, 10:30, 14:30, 18:30에 실행된다.
    - cron: '30 22 * * *'
    - cron: '30 1 * * *'
    - cron: '30 5 * * *'
    - cron: '30 9 * * *'

permissions:
  contents: write

concurrency:
  group: beanpick-iphone-snapshot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}
      NAVER_COMMERCE_CLIENT_ID: ${{ secrets.NAVER_COMMERCE_CLIENT_ID }}
      NAVER_COMMERCE_CLIENT_SECRET: ${{ secrets.NAVER_COMMERCE_CLIENT_SECRET }}
      BEANPICK_AUTO_PUBLISH_TIMEOUT_MS: 1200000
      ELECTRON_DISABLE_SANDBOX: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Load beans and publish iPhone snapshot
        run: xvfb-run -a npm run iphone:snapshot:publish
