name: Publish iPhone Snapshot

on:
  workflow_dispatch:
    inputs:
      force_gemini_notes:
        description: '스마트스토어 기존 노트 상품도 Gemini로 다시 읽기'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    # GitHub cron은 UTC 기준이다. 한국시간 09:00, 12:00, 14:00에 실행된다.
    - cron: '0 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 5 * * *'

permissions:
  contents: write

concurrency:
  group: beanpick-iphone-snapshot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ github.token }}
      NAVER_COMMERCE_CLIENT_ID: ${{ secrets.NAVER_COMMERCE_CLIENT_ID }}
      NAVER_COMMERCE_CLIENT_SECRET: ${{ secrets.NAVER_COMMERCE_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BEANPICK_FORCE_GEMINI_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.force_gemini_notes == 'true' && '1' || '0' }}
      BEANPICK_AUTO_PUBLISH_TIMEOUT_MS: 1200000
      ELECTRON_DISABLE_SANDBOX: 1
      # 게시 사이에 유지할 Gemini 노트 OCR 캐시 위치(아래 cache 스텝이 저장·복원한다)
      BEANPICK_OCR_CACHE_DIR: ${{ github.workspace }}/.ocr-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 게시마다 새 가상머신이라 OCR 캐시가 날아가던 문제를 막는다.
      # run_id로 매번 새 키를 만들어 항상 저장하고, restore-keys로 직전 캐시를 복원해 누적한다.
      - name: Restore Gemini OCR cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ocr-cache
          key: beanpick-ocr-cache-${{ github.run_id }}
          restore-keys: |
            beanpick-ocr-cache-

      - name: Install dependencies
        run: npm ci

      - name: Run safety tests
        run: |
          npm run tasting-notes:test
          npm run core-features:test
          npm run dataquality:test
          npm run iphone-webapp:test
          npm run history:test

      - name: Build app
        run: npm run build

      - name: Prepare GitHub Pages app
        run: node scripts/prepare-pages.cjs

      - name: Publish GitHub Pages app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if ! git diff --cached --quiet; then
            git commit -m "Update BeanPick iPhone web app"
            git push
          fi

      - name: Load beans and publish iPhone snapshot
        run: xvfb-run -a npm run iphone:snapshot:publish
